name: Build & Release

on:
  repository_dispatch:
    types: [release-build]
  workflow_dispatch:
    inputs:
      tag:
        description: "版本 tag（如 v0.2.0）"
        required: true
      sha:
        description: "源码 commit SHA"
        required: true
  # 可复用入口：被 catchup.yml 逐个 tag 串行调用（补发上游漏掉的 tag）。
  workflow_call:
    inputs:
      tag:
        description: "版本 tag"
        required: true
        type: string
      sha:
        description: "源码 commit SHA"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # 前置预检：拉取源码，先跑一遍 格式检查 / Clippy / 测试。
  # 任何一项不过都会让后面的全平台构建直接跳过，避免白跑六个平台。
  preflight:
    name: 预检（fmt / clippy / test）
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          repository: icqqjs/icqq-rust-onebot
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.sha || inputs.sha }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: 缓存 cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: preflight

      - name: 格式检查
        run: cargo fmt --all -- --check

      - name: Clippy（0 警告）
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: 测试
        run: cargo test --workspace

  build:
    name: 构建 ${{ matrix.name }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: icqq-linux
            ext: ""

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            name: icqq-linux-arm64
            ext: ""

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: icqq-windows
            ext: ".exe"

          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            name: icqq-windows-arm64
            ext: ".exe"

          - target: x86_64-apple-darwin
            os: macos-15-intel
            name: icqq-macos-x64
            ext: ""

          - target: aarch64-apple-darwin
            os: macos-latest
            name: icqq-macos
            ext: ""

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          repository: icqqjs/icqq-rust-onebot
          token: ${{ secrets.SOURCE_REPO_TOKEN }}
          ref: ${{ github.event.client_payload.sha || inputs.sha }}

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 构建
        run: cargo build --release --target ${{ matrix.target }} -p icqq-app

      - name: 打包 tar.gz
        shell: bash
        run: |
          name="${{ matrix.name }}"
          bin="$name${{ matrix.ext }}"
          mkdir -p dist
          # 二进制按平台名重命名（如 icqq-windows.exe / icqq-linux / icqq-macos），
          # 多平台下载到一起也能区分。
          cp "target/${{ matrix.target }}/release/icqq-app${{ matrix.ext }}" "dist/$bin"
          # 把示例配置一起打进发布包（随上游源码 checkout 而来，在仓库根）。
          cp config.example.yaml dist/
          # 平铺打包：解压后直接是「二进制 + config.example.yaml」两个文件，无外层目录。
          tar czf "$name.tar.gz" -C dist "$bin" config.example.yaml

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}.tar.gz
          path: ${{ matrix.name }}.tar.gz

  release:
    name: 发布 Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 整理产物
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/
          done
          ls -la release/

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.client_payload.tag || inputs.tag }}
          name: ${{ github.event.client_payload.tag || inputs.tag }}
          make_latest: true
          files: release/*
          body: |
            ## icqq-onebot ${{ github.event.client_payload.tag || inputs.tag }}

            源码 commit: `${{ github.event.client_payload.sha || inputs.sha }}`

            ### 下载
            | 平台 | 文件 |
            |------|------|
            | Linux x64 | `icqq-linux.tar.gz` |
            | Linux arm64 | `icqq-linux-arm64.tar.gz` |
            | Windows x64 | `icqq-windows.tar.gz` |
            | Windows arm64 | `icqq-windows-arm64.tar.gz` |
            | macOS arm64 | `icqq-macos.tar.gz` |
            | macOS x64 | `icqq-macos-x64.tar.gz` |
